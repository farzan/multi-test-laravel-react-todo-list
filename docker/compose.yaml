name: quick_laravel_test_1

services:
  php-fpm:
    build:
      context: ..
      dockerfile: docker/images/php/Dockerfile
      target: php-fpm
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../:/app
    networks:
      - app

  php-cli:
    build:
      context: ..
      dockerfile: docker/images/php/Dockerfile
      target: php-cli
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    working_dir: /app
    stdin_open: true
    tty: true
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../:/app
    networks:
      - app

  php-build:
    build:
      context: ..
      dockerfile: docker/images/php/Dockerfile
      target: php-build
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    working_dir: /app
    stdin_open: true
    tty: true
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../:/app
    networks:
      - app

  nginx:
    build:
      context: ..
      dockerfile: docker/images/nginx/Dockerfile
    depends_on:
      php-fpm:
        condition: service_started
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ../:/app:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - app

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./images/mysql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app

networks:
  app:
    external: true
    name: quick_laravel_test_1_network

volumes:
  mysql-data:
