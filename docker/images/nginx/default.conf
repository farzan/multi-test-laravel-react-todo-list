server {
    listen 80;
    server_name _;

    root /var/www/public;
    index index.php;

    #
    # API (Laravel)
    #
    location ^~ /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    #
    # PHP (Laravel front controller)
    #
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    #
    # React assets (IMPORTANT: no rewrite here)
    #
    location ^~ /frontend/ {
        try_files $uri $uri/ =404;
    }

    #
    # React SPA entry point
    #
    location = / {
        try_files /frontend/index.html =404;
    }

    #
    # Everything else → Laravel or static
    #
    location / {
        try_files $uri $uri/ =404;
    }
}
